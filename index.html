<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>BaaS - Base64 Photo App</title>
    <style>
        body { font-family: 'Inter', sans-serif; background: #f4f7f6; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .container { width: 100%; max-width: 500px; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .auth-bar { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; }
        .user-avatar { width: 40px; height: 40px; border-radius: 50%; border: 2px solid #007bff; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button { background: #007bff; color: white; border: none; padding: 12px; border-radius: 6px; width: 100%; cursor: pointer; font-weight: 600; }
        button:disabled { background: #ccc; }
        .post { background: #fff; border: 1px solid #eaeaea; padding: 15px; margin-top: 15px; border-radius: 8px; width: 100%; max-width: 500px; }
        .post-img { width: 100%; border-radius: 8px; margin-top: 10px; display: block; max-height: 300px; object-fit: cover; }
        .time { font-size: 11px; color: #999; float: right; }
        .like-btn { margin-top: 10px; background: #f8f9fa; color: #333; width: auto; padding: 5px 15px; }
    </style>
</head>
<body>

    <div id="authSection" class="container">
        <button id="loginBtn">Войти через Google</button>
        <div id="userInfo" style="display:none;" class="auth-bar">
            <img id="userPhoto" class="user-avatar" src="" alt="">
            <b id="userName"></b>
            <button id="logoutBtn" style="width:auto; background:#ff4757; margin-left:auto;">Выход</button>
        </div>
    </div>

    <div id="messageForm" class="container" style="display:none;">
        <h3>Новая запись</h3>
        <input type="text" id="content" placeholder="Ваше сообщение...">
        <p style="font-size: 12px; color: #666; margin: 5px 0;">Добавить фото:</p>
        <input type="file" id="imageInput" accept="image/*">
        <button id="mainBtn">Опубликовать</button>
    </div>

    <div id="feed"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp, updateDoc, doc, increment } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB2Dvbwn_h5ytHaFn02ueuoQd7Qy2pf1G4",
            authDomain: "project-1-efb5b.firebaseapp.com",
            projectId: "project-1-efb5b",
            storageBucket: "project-1-efb5b.firebasestorage.app",
            messagingSenderId: "882057077841",
            appId: "1:882057077841:web:7bd79d8f0d19b7bf0e4470"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        // Помощник для превращения картинки в текст
        const readFileAsBase64 = (file) => {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => resolve(reader.result);
                reader.onerror = reject;
                reader.readAsDataURL(file);
            });
        };

        // Управление входом
        onAuthStateChanged(auth, (user) => {
            document.getElementById('loginBtn').style.display = user ? 'none' : 'block';
            document.getElementById('userInfo').style.display = user ? 'flex' : 'none';
            document.getElementById('messageForm').style.display = user ? 'block' : 'none';
            if(user) {
                document.getElementById('userName').innerText = user.displayName;
                document.getElementById('userPhoto').src = user.photoURL;
            }
        });

        document.getElementById('loginBtn').onclick = () => signInWithPopup(auth, provider);
        document.getElementById('logoutBtn').onclick = () => signOut(auth);

        window.processLike = (id) => updateDoc(doc(db, "requests", id), { likes: increment(1) });

        // Публикация с Base64
        document.getElementById('mainBtn').onclick = async () => {
            const content = document.getElementById('content').value;
            const fileInput = document.getElementById('imageInput');
            const btn = document.getElementById('mainBtn');
            
            if (!content && !fileInput.files[0]) return alert("Заполните текст или выберите фото!");

            btn.disabled = true;
            btn.innerText = "Загрузка...";

            try {
                let base64Image = null;
                if (fileInput.files[0]) {
                    base64Image = await readFileAsBase64(fileInput.files[0]);
                }

                await addDoc(collection(db, "requests"), {
                    name: auth.currentUser.displayName,
                    photo: auth.currentUser.photoURL,
                    content: content,
                    imageText: base64Image, // Картинка хранится здесь как текст
                    likes: 0,
                    timestamp: serverTimestamp()
                });

                document.getElementById('content').value = "";
                fileInput.value = "";
            } catch (e) {
                console.error(e);
                alert("Ошибка! Возможно, файл слишком большой.");
            }
            btn.disabled = false;
            btn.innerText = "Опубликовать";
        };

        // Лента
        const q = query(collection(db, "requests"), orderBy("timestamp", "desc"));
        onSnapshot(q, (snaps) => {
            const feed = document.getElementById('feed');
            feed.innerHTML = "";
            snaps.forEach(d => {
                const s = d.data();
                feed.innerHTML += `
                    <div class="post">
                        <span class="time">${s.timestamp?.toDate().toLocaleTimeString() || '...'}</span>
                        <div style="display:flex; align-items:center; gap:10px;">
                            <img src="${s.photo}" style="width:30px; border-radius:50%;">
                            <b>${s.name}</b>
                        </div>
                        <p>${s.content}</p>
                        ${s.imageText ? `<img src="${s.imageText}" class="post-img">` : ''}
                        <button class="like-btn" onclick="processLike('${d.id}')">👍 ${s.likes || 0}</button>
                    </div>`;
            });
        });
    </script>
</body>
</html>
