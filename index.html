<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>BaaS - Популярные запросы</title>
    <style>
        body { font-family: 'Inter', sans-serif; background: #f4f7f6; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .container { width: 100%; max-width: 500px; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button#mainBtn { background: #007bff; color: white; border: none; padding: 12px; border-radius: 6px; width: 100%; font-weight: 600; cursor: pointer; transition: 0.3s; }
        .post { background: #fff; border: 1px solid #eaeaea; padding: 15px; margin-top: 15px; border-radius: 8px; width: 100%; max-width: 500px; position: relative; }
        .like-btn { cursor: pointer; border: none; background: #f8f9fa; padding: 5px 12px; border-radius: 20px; font-size: 14px; transition: 0.2s; }
        .like-btn:hover { background: #e2e6ea; }
        .time { font-size: 11px; color: #999; float: right; }
        h4 { color: #007bff; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div class="container">
        <h3>Панель управления данными</h3>
        <input type="text" id="name" placeholder="Имя профиля">
        <input type="email" id="email" placeholder="Рабочий Email">
        <button id="mainBtn">Опубликовать в облако</button>
    </div>

    <div id="feed" style="width: 100%; max-width: 500px; margin-top: 20px;"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
        import { 
            getFirestore, collection, addDoc, query, orderBy, onSnapshot, 
            serverTimestamp, updateDoc, doc, increment, where // Добавлен where
        } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

        // КОНФИГУРАЦИЯ
        const firebaseConfig = {
            apiKey: "AIzaSyB2Dvbwn_h5ytHaFn02ueuoQd7Qy2pf1G4",
            authDomain: "project-1-efb5b.firebaseapp.com",
            projectId: "project-1-efb5b",
            storageBucket: "project-1-efb5b.firebasestorage.app",
            messagingSenderId: "882057077841",
            appId: "1:882057077841:web:7bd79d8f0d19b7bf0e4470",
            measurementId: "G-X5195BQB6R"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // --- ФУНКЦИЯ ФОРМАТИРОВАНИЯ ДАТЫ ---
        const formatDate = (timestamp) => {
            if (!timestamp) return "Загрузка...";
            const date = timestamp.toDate();
            const d = String(date.getDate()).padStart(2, '0');
            const m = String(date.getMonth() + 1).padStart(2, '0');
            const y = date.getFullYear();
            return `Дата: ${d}.${m}.${y}`; 
        };

        // МЕТОД: АТОМАРНОЕ ОБНОВЛЕНИЕ (LIKES)
        window.processLike = async (id) => {
            const docRef = doc(db, "requests", id);
            try {
                await updateDoc(docRef, { likes: increment(1) });
            } catch (e) { console.error("Validation Error:", e.message); }
        };

        // МЕТОД: ЗАПИСЬ С ВАЛИДАЦИЕЙ
        document.getElementById('mainBtn').onclick = async () => {
            const btn = document.getElementById('mainBtn');
            const nameInput = document.getElementById('name');
            const emailInput = document.getElementById('email');

            btn.disabled = true;
            try {
                await addDoc(collection(db, "requests"), {
                    name: nameInput.value,
                    email: emailInput.value,
                    likes: 0,
                    timestamp: serverTimestamp()
                });
                emailInput.value = "";
                nameInput.value = "";
            } catch (e) { alert("Ошибка безопасности: Данные отклонены сервером."); }
            btn.disabled = false;
        };

        // --- МЕТОД: REAL-TIME СИНХРОНИЗАЦИЯ С ФИЛЬТРОМ ---
        // Показываем только посты, где больше 5 лайков
        const q = query(
            collection(db, "requests"), 
            where("likes", ">", 5), 
            orderBy("likes", "desc")
        );

        onSnapshot(q, (snapshot) => {
            const feed = document.getElementById('feed');
            feed.innerHTML = "<h4>🔥 Популярное (> 5 лайков)</h4>";
            
            if (snapshot.empty) {
                feed.innerHTML += "<p>Пока нет популярных записей. Ставьте лайки!</p>";
            }

            snapshot.forEach((doc) => {
                const data = doc.data();
                feed.innerHTML += `
                    <div class="post">
                        <span class="time">${formatDate(data.timestamp)}</span>
                        <b>${data.name}</b>
                        <p style="margin: 5px 0;">${data.email}</p>
                        <button class="like-btn" onclick="processLike('${doc.id}')">👍 ${data.likes || 0}</button>
                    </div>
                `;
            });
        }, (error) => {
            console.error("Snapshot error:", error);
            // Если видишь ошибку индекса в консоли (F12) - нажми на ссылку в ней!
        });
    </script>
</body>
</html>
